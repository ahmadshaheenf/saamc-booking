<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>يرجى الانتظار - خدمات العاملات المنزلية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: linear-gradient(135deg, #eafaf1 0%, #ffffff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
    </style>
</head>
<body>

    <div class="waiting-card">
        <div class="spinner"></div>
        <h1>يرجى الانتظار</h1>
        <p>يرجى عدم إغلاق المتصفح</p>
        <p style="margin-top:15px; font-size:16px; color:#888; font-weight:400;">
            جاري معالجة طلبك...
        </p>
    </div>

    <script>
        // تحديد صفحة التحقق حسب نوع الحجز
        const bookingType = sessionStorage.getItem('current_booking_type') || 'hourly';
        const verificationPages = {
            hourly: 'verification.html',
            monthly: 'verification.html',
            resident: 'verification.html'
        };

        setTimeout(function () {
            window.location.href = verificationPages[bookingType] || 'verification.html';
        }, 16000);
    </script>

</body>
</html>
